name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
      
      - name: Install dependencies
        run: |
          pip install mkdocs
          # Se você decidir usar o tema Material no futuro, adicione aqui:
          # pip install mkdocs-material
      
      - name: Build site
        run: mkdocs build --clean
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # O MkDocs gera o site pronto na pasta 'site' por padrão
          path: './site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4